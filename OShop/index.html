<!-- ================= TOP BAR ================= -->
<header class="topbar">
  <div class="topbar-in">
    <a class="wordmark" href="#/" aria-label="OShopping home">
      <span class="mk-dot"><svg class="ic"><use href="#i-bag"/></svg></span>
      <span class="mk-text">OShopping</span>
    </a>
    <nav class="top-nav" id="topNav" aria-label="Categories"></nav>
    <button class="top-search" id="topSearch" aria-label="Search">
      <svg class="ic"><use href="#i-search"/></svg>
      <span>Search OShopping</span>
    </button>
    <div class="top-actions">
      <button class="iconbtn" id="themeToggle" aria-label="Toggle theme"><svg class="ic"><use href="#i-moon"/></svg></button>
      <a class="iconbtn" href="#/saved" aria-label="Saved"><svg class="ic"><use href="#i-heart"/></svg><span class="badge-dot" id="savedBadge" hidden>0</span></a>
      <a class="iconbtn" href="#/cart" aria-label="Cart"><svg class="ic"><use href="#i-bag"/></svg><span class="badge-dot" id="cartBadge" hidden>0</span></a>
      <a class="avatar" href="#/account" aria-label="Account" id="avatar">SJ</a>
    </div>
  </div>
</header>

<!-- ================= APP ROOT ================= -->
<main id="app" class="container"></main>

<!-- ================= MOBILE TAB BAR ================= -->
<nav class="tabbar" id="tabbar" aria-label="Primary">
  <a href="#/" data-tab="home"><svg class="ic"><use href="#i-house"/></svg>Home</a>
  <a href="#/search" data-tab="search"><svg class="ic"><use href="#i-search"/></svg>Search</a>
  <a href="#/saved" data-tab="saved"><svg class="ic"><use href="#i-heart"/></svg>Saved<span class="tb-badge" id="tbSaved" hidden>0</span></a>
  <a href="#/cart" data-tab="cart"><svg class="ic"><use href="#i-bag"/></svg>Cart<span class="tb-badge" id="tbCart" hidden>0</span></a>
  <a href="#/account" data-tab="account"><svg class="ic"><use href="#i-person"/></svg>Account</a>
</nav>

<!-- ================= TOAST + OVERLAY ================= -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <span class="t-ic"><svg class="ic"><use href="#i-check"/></svg></span>
  <span id="toastMsg">Added to Cart</span>
  <button id="toastAction" hidden></button>
</div>

<div class="overlay" id="authOverlay">
  <div class="box">
    <svg class="ic"><use href="#i-shield"/></svg>
    <h4>Authorizing payment</h4>
    <p id="authDetail">OShopping Pay</p>
    <div class="spinner"></div>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
