<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost in the cloud — Oplo</title>
<meta name="description" content="This page drifted off. Head back to Oplo.">
<meta name="theme-color" content="#FCFCFD">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='o' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%239BE8CE'/%3E%3Cstop offset='.4' stop-color='%239CC3FF'/%3E%3Cstop offset='.7' stop-color='%23D4B3FF'/%3E%3Cstop offset='1' stop-color='%23FFD2B3'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23o)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400..800&family=Instrument+Sans:wght@400..700&family=Spline+Sans+Mono:wght@400..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/site.css">
<style>
  .soon-nav{position:fixed;inset:0 0 auto 0;z-index:10}
  .soon-nav .inner{max-width:var(--container);margin-inline:auto;padding:0 var(--gutter);height:62px;display:flex;align-items:center;justify-content:space-between}
  .soon-nav .links{display:flex;align-items:center;gap:22px;font-size:14px;font-weight:500;color:var(--slate)}
  .soon-nav .links a:not(.btn-pill){transition:color .2s}
  .soon-nav .links a:not(.btn-pill):hover{color:var(--ink)}
  .e-wrap{min-height:100vh;display:grid;place-items:center;padding:104px 24px 64px;text-align:center;position:relative;overflow:hidden}
  .e-glow{position:absolute;top:16%;left:50%;width:min(760px,120vw);aspect-ratio:2/1;transform:translateX(-50%);
    background:radial-gradient(60% 60% at 50% 40%,rgba(156,195,255,.28),rgba(212,179,255,.18) 45%,transparent 72%);filter:blur(18px);pointer-events:none}
  .e-inner{position:relative;max-width:560px}
  .e-opal{width:120px;height:120px;border-radius:50%;margin:0 auto 34px;position:relative;overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(11,12,15,.05),0 30px 60px -26px rgba(120,128,164,.55);animation:float 9s ease-in-out infinite}
  .e-opal::before{content:"";position:absolute;inset:-22%;filter:blur(12px);
    background:radial-gradient(38% 38% at 28% 26%,var(--mint) 0%,transparent 62%),radial-gradient(42% 42% at 74% 30%,var(--sky) 0%,transparent 60%),radial-gradient(46% 46% at 68% 76%,var(--lilac) 0%,transparent 62%),radial-gradient(44% 44% at 24% 74%,var(--peach) 0%,transparent 62%),var(--opal)}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .e-code{font-family:var(--font-mono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:14px}
  .e-inner h1{font-family:var(--font-display);font-size:clamp(36px,6.4vw,60px);font-weight:600;letter-spacing:-.035em;line-height:1.04}
  .e-inner p.tag{font-size:clamp(17px,2.2vw,20px);color:var(--slate);margin:16px auto 0;max-width:36ch;line-height:1.5}
  .e-actions{display:flex;justify-content:center;flex-wrap:wrap;gap:14px 22px;margin-top:34px}
</style>
</head>
<body>
  <nav class="soon-nav">
    <div class="inner">
      <a class="wordmark" href="/"><span class="opal-dot" aria-hidden="true"></span>Oplo</a>
      <div class="links"><a href="/productivity/">Products</a><span id="oplo-actions"></span></div>
    </div>
  </nav>
  <main class="e-wrap">
    <div class="e-glow" aria-hidden="true"></div>
    <div class="e-inner">
      <div class="e-opal" aria-hidden="true"></div>
      <p class="e-code">Error 404</p>
      <h1>This page drifted off.</h1>
      <p class="tag">The link may be old, or the page moved. Everything Oplo is one tap away from the launcher.</p>
      <div class="e-actions">
        <a class="btn-pill" href="/">Back to Oplo <span aria-hidden="true">&rarr;</span></a>
        <a class="link-arrow muted" href="/productivity/">Explore the apps <span class="chev" aria-hidden="true">&rarr;</span></a>
      </div>
    </div>
  </main>
  <script src="/assets/js/oplo-shell.js" defer></script>
</body>
</html>
